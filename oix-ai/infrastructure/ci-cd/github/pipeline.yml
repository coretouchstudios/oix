name: OIX CI Pipeline

on:
 push:
  branches:
   - main

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - name: Checkout
    uses: actions/checkout@v3

  - name: Install Node
    uses: actions/setup-node@v3
    with:
      node-version: 20

  - name: Install Dependencies
    run: npm install

  - name: Build
    run: npm run build
